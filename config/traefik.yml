# Traefik static configuration

# API and Dashboard
api:
  dashboard: true
  insecure: true

# Entry points
entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    watch: true

# Let's Encrypt (ACME) configuration
certificatesResolvers:
  letsencrypt:
    acme:
      storage: /certs/acme.json
      httpChallenge:
        entryPoint: web
      caServer: https://acme-staging-v02.api.letsencrypt.org/directory

# Logging
log:
  level: INFO
  format: common

# Access logs
accessLog:
  format: common
  bufferingSize: 100
